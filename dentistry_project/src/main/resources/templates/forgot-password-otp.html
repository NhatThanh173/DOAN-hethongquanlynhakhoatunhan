<!doctype html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mã OTP đặt lại mật khẩu</title>
</head>
<body
        style="
      margin: 0;
      padding: 0;
      background: #f8fafc;
      font-family: Arial, sans-serif;
      color: #0f172a;
    "
>
<table
        role="presentation"
        width="100%"
        cellpadding="0"
        cellspacing="0"
        style="padding: 24px 12px"
>
    <tr>
        <td align="center">
            <table
                    role="presentation"
                    width="100%"
                    cellpadding="0"
                    cellspacing="0"
                    style="
              max-width: 620px;
              background: #ffffff;
              border: 1px solid #e2e8f0;
              border-radius: 14px;
              overflow: hidden;
            "
            >
                <tr>
                    <td
                            style="
                  padding: 22px 24px;
                  background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
                  color: #ffffff;
                "
                    >
                        <h1 style="margin: 0; font-size: 22px">
                            Mã OTP đặt lại mật khẩu
                        </h1>
                        <p style="margin: 8px 0 0; font-size: 14px; opacity: 0.95">
                            Nha Khoa Việt Smile
                        </p>
                    </td>
                </tr>

                <tr>
                    <td style="padding: 22px 24px">
                        <p style="margin: 0 0 12px">
                            Xin chào <b th:text="${name}">Người dùng</b>,
                        </p>

                        <p style="margin: 0 0 16px; line-height: 1.6">
                            Hệ thống đã nhận được yêu cầu đặt lại mật khẩu cho tài khoản của bạn.
                        </p>

                        <p style="margin: 0 0 8px; color: #475569">Mã OTP của bạn là:</p>

                        <div
                                style="
                    margin: 0 0 16px;
                    background: #eff6ff;
                    border: 1px solid #bfdbfe;
                    border-radius: 12px;
                    padding: 18px 12px;
                    text-align: center;
                  "
                        >
                            <div
                                    th:text="${otp}"
                                    style="
                      font-size: 32px;
                      font-weight: 700;
                      letter-spacing: 8px;
                      color: #1d4ed8;
                    "
                            >
                                123456
                            </div>
                        </div>

                        <table
                                role="presentation"
                                width="100%"
                                cellpadding="0"
                                cellspacing="0"
                                style="border-collapse: collapse; margin: 0 0 16px"
                        >
                            <tr>
                                <td style="padding: 8px 0; color: #64748b; width: 42%">
                                    Thời hạn hiệu lực
                                </td>
                                <td style="padding: 8px 0">
                                    <b><span th:text="${expiredMinutes}">5</span> phút</b>
                                </td>
                            </tr>
                            <tr>
                                <td style="padding: 8px 0; color: #64748b">Tài khoản</td>
                                <td style="padding: 8px 0">
                                    <b th:text="${identifier}">admin@gmail.com</b>
                                </td>
                            </tr>
                        </table>

                        <p
                                style="
                    margin: 0;
                    line-height: 1.6;
                    background: #f8fafc;
                    border: 1px solid #e2e8f0;
                    border-radius: 10px;
                    padding: 10px 12px;
                  "
                        >
                            Nếu bạn không thực hiện yêu cầu này, vui lòng bỏ qua email này.
                        </p>
                    </td>
                </tr>
            </table>
        </td>
    </tr>
</table>
</body>
</html>
